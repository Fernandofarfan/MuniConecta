name: Deploy to Cloud Run
on:
  push:
    branches: [ main ]
jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: pip install -r requirements.txt
    - name: Run Pytest
      run: pytest test_api.py
    - name: Google Auth (Mock)
      run: echo "Autenticación WIF configurada en entorno de producción real"
    - name: Build and Deploy to Cloud Run
      run: echo "Despliegue simulado exitoso post-testing"
